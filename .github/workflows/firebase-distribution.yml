name: Firebase App Distribution

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build & Distribute
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Extract Git Metadata
        id: meta
        run: |
          echo "CI_BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
          # Use jq to safely escape multiline commit messages
          commit_msg=$(git log -1 --pretty=%B)
          echo "CI_COMMIT_MESSAGE<<EOF" >> $GITHUB_ENV
          echo "$commit_msg" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Restore Firebase Credentials
        env:
          FIREBASE_CREDENTIAL_JSON: ${{ secrets.FIREBASE_CREDENTIAL_JSON }}
        run: echo "$FIREBASE_CREDENTIAL_JSON" > firebase_credentials.json

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload to Firebase App Distribution
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase_credentials.json
        run: ./gradlew appDistributionUploadDebug
